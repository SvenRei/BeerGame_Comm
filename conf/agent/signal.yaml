# conf/agent/signal.yaml
# SIGNAL (Strategic Information-sharing for Game-theoretic, Networked, Adaptive
# Logistics) -- minimal communicating MAPPO agent. Select with `agent=signal`.
# The agent is an INSTRUMENT; the message channel + economics are the study.
algorithm: signal

# ===================== communication (the object of study) =====================
use_comm: true            # false -> ADJ is zeroed (no-comm control, IDENTICAL architecture)
msg_content: dhat         # raw | dhat | ip | dhat_ip | learned   (the semantic ladder; raw = last realized
                          # incoming demand, the classical POS-data rung -- Cachon-Fisher 2000 / prereg D1)
learned_msg_dim: 3        # message width when msg_content=learned (interpretability control)
learned_msg_gain: 10.0    # gain on the tanh learned message so it rides at the same O(10) scale as dhat/ip
                          # (bounded but AUDIBLE; without it the learned rung is scale-handicapped -> H5 invalid)
comm_topology: neighbor   # neighbor | skip | full | retailer_broadcast | no_neighbor

# ===================== economics layer (rides on the reward) =====================
srdqn_beta: 1.0           # 1.0 = cooperative (team cost) ; 0.0 = self-interested (price of anarchy)
tau: 0.0                  # coordinating transfer on UPSTREAM backorders; tau* = p - b ; 0 = no contract

# ===================== agent size =====================
hidden: 64                # GRU hidden = belief width AND critic width
max_order: 100            # must match env.max_order
# Base-stock head: condition the order-up-to level S on the smoothed demand estimate d_hat, making the
# policy regime-adaptive (S ~= dhat_coef*d_hat + safety; textbook (lead+1)*mean-demand + safety). Using
# d_hat rather than the raw last demand keeps sampling noise out of S (no bullwhip); it also lets
# communication affect ordering (message -> belief h -> d_hat -> S). false recovers a constant base-stock.
use_dhat_head: true
dhat_coef: 5              # init weight on d_hat in the S-head (~ lead+1 = protection interval)
dhat_init: 14            # init d_head bias so d_hat starts ~ mean training demand (softplus link)
s_init: 5                 # head bias / safety floor (small; d_hat now supplies the demand-scaled level)

# ===================== training env =====================
train_env: dr_poisson     # dr_poisson | ar1 | family
dr_lambda_lo: 4.0
dr_lambda_hi: 24.0
dr_p_shift: 0.0           # 0 = stationary (matches the stationary held-out gate)
dr_shift_scale: 2.5
ar1_mu: 12.0
ar1_rho: 0.6              # set per-rho for the autocorrelation sweep (H2): {0,.3,.6,.9}
ar1_sigma: 3.0
dr_families: [poisson, negbin]   # when train_env=family; ar1 held out for the distribution-shift test
nb_mu_lo: 4.0
nb_mu_hi: 24.0
nb_dispersion_lo: 2.0
nb_dispersion_hi: 12.0
ar1_mu_lo: 4.0
ar1_mu_hi: 24.0
ar1_rho_lo: 0.0
ar1_rho_hi: 0.8

# ===================== PPO / optimization =====================
gamma: 0.99
gae_lambda: 0.95
eps_clip: 0.2
k_epochs: 4
entropy_coef: 0.0
vf_coef: 0.5
aux_coef: 0.1             # d_hat grounding (keeps the demand message interpretable as a forecast)
max_grad_norm: 0.5
lr: 3.0e-4
reward_scale: 1.0         # divides the shaped reward; >1 (e.g. 100) shrinks the critic gradient so the
                          # shared gradient clip stops starving the actor and S can move
log_std_init: -0.5        # initial exploration std on S = exp(log_std_init); raise (e.g. 1.0 => std ~2.7)

# ===================== training loop =====================
batch_episodes: 8
log_every: 100            # heartbeat: print ep / train cost / losses every N episodes (0 = only gate prints)
patience: 0               # early stop after this many episodes with NO held-out improvement (0 = off; sweep ~2000).
                          # The best-gated checkpoint is always kept, so early stop never loses the best policy.
budget_milestones: [1000, 2000, 4000, 8000]   # substitution-curve snapshots (== prereg design.budget_milestones):
                          # at each milestone M the trainer copies the best-gated-so-far payload to
                          # signal_checkpoint_budget{M}.pt. The key must be declared here because Hydra
                          # struct mode rejects a CLI override for an unknown key (ConfigCompositionException).
warm_up_episodes: 0       # 0: SIGNAL's belief is trained by the policy gradient (no pre-train)
use_gpu: false            # training is CPU-bound (sequential per-step encode); CPU torch wheels

# ===================== held-out gate (leakage-safe selection) =====================
heldout_mode: poisson     # poisson | ar1
heldout_lambdas: [8, 12, 16, 20]        # VALIDATION split; TEST {6,10,14,18,22} scored post-hoc
heldout_ar1_rhos: [0.15, 0.45, 0.75]    # validation rho (disjoint from test rho) when heldout_mode=ar1
heldout_every: 200        # eval cadence (episodes); 100 dense pilot, 400 sweep
heldout_episodes: 8       # episodes per regime; 8 fast pilot, 20 clean
heldout_fixed_ref: 4726.0  # BAR     fallback if results/baselines_regime_v2.json is absent
heldout_oracle_ref: 2202.0 # CEILING fallback